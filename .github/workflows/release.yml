# Compile, teste et publie le JAR exécutable dans une GitHub Release, sur push d'un tag de version.

name: Tourguide - Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # nécessaire pour créer la Release et y attacher le JAR

jobs:
  release:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Installation des bibliothèques locales
        run: |
          ./mvnw install:install-file -Dfile=libs/gpsUtil.jar -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar
          ./mvnw install:install-file -Dfile=libs/RewardCentral.jar -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar
          ./mvnw install:install-file -Dfile=libs/TripPricer.jar -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar

      - name: Compilation, tests et construction du JAR
        run: ./mvnw verify

      - name: Publie la Release avec le JAR téléchargeable
        uses: softprops/action-gh-release@v2
        with:
          files: target/tourguide-*.jar
          generate_release_notes: true
